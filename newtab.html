<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTab</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="切换浅色/暗色模式">
    <svg class="theme-icon-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="theme-icon-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div class="container">
    <div class="header">
      <div class="clock" id="clock">--:--:--</div>
    </div>
    <div class="search-wrapper">
      <div class="search-box">
        <button class="engine-btn" id="engineBtn" title="切换搜索引擎">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" id="engineBtnIcon"><circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.2"/><text x="12" y="16" text-anchor="middle" font-size="12" font-weight="600" fill="currentColor">G</text></svg>
          <svg class="engine-btn-arrow" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="engine-dropdown" id="engineDropdown">
          <div class="engine-option active" data-engine="google">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="12" fill="#4285F4"/><text x="12" y="16" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">G</text></svg>
            <span class="engine-name">Google</span>
          </div>
          <div class="engine-option" data-engine="bing">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="12" fill="#00809D"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">BI</text></svg>
            <span class="engine-name">Bing</span>
          </div>
          <div class="engine-option" data-engine="baidu">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="12" fill="#2932E1"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">百</text></svg>
            <span class="engine-name">百度</span>
          </div>
        </div>
        <div class="search-divider"></div>
        <input type="text" id="search" placeholder="搜索或输入网址" autofocus>
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-results-inner" id="searchResultsInner"></div>
      </div>
    </div>
    <div class="main-area">
      <div class="top-sites-section">
        <div class="section-header">
          <h2 class="section-title">常用网站</h2>
          <div class="section-actions">
            <button class="section-link" id="refreshBtn" title="刷新数据">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
            <button class="section-link" id="addSiteBtn" title="添加网站">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="section-link" id="rankToggle">统计</button>
          </div>
        </div>
        <div class="site-group-tabs" id="siteGroupTabs">
          <button class="site-group-tab active" data-group="all">全部</button>
          <button class="site-group-tab" data-group="work">工作</button>
          <button class="site-group-tab" data-group="study">学习</button>
          <button class="site-group-tab" data-group="tool">工具</button>
          <button class="site-group-tab" data-group="other">其他</button>
        </div>
        <div class="sites-grid" id="sitesGrid">
        </div>
      </div>
      <aside class="rank-panel usage-panel" id="rankPanel">
        <div class="usage-panel-header">
          <h3 class="rank-panel-title">使用统计</h3>
          <div class="usage-tabs" id="usageTabs">
            <button class="usage-tab active" data-range="today">今天</button>
            <button class="usage-tab" data-range="7d">7天</button>
            <button class="usage-tab" data-range="30d">30天</button>
          </div>
        </div>
        <div class="usage-content" id="usageContent"></div>
      </aside>
    </div>
    <div class="add-form" id="addForm">
      <div class="add-form-inner">
        <h3 id="addFormTitle">添加网站</h3>
        <label>网址</label>
        <input type="text" id="addUrl" placeholder="https://example.com">
        <label>名称</label>
        <input type="text" id="addName" placeholder="网站名称">
        <div class="add-form-actions">
          <button class="add-form-cancel" id="addCancel">取消</button>
          <button class="add-form-confirm" id="addConfirm">确认</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 快捷便签 -->
  <button class="note-fab" id="noteFab" title="快捷便签">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span class="note-fab-dot" id="noteFabDot"></span>
  </button>
  <div class="note-panel" id="notePanel">
    <div class="note-panel-header">
      <span class="note-panel-title">快捷便签</span>
      <button class="note-panel-close" id="notePanelClose">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <textarea class="note-textarea" id="noteTextarea" placeholder="随便写点东西..." maxlength="5000"></textarea>
    <div class="note-panel-footer">
      <span class="note-saved" id="noteSaved"></span>
      <span class="note-count" id="noteCount">0</span>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
