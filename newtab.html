<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="clock" id="clock">--:--:--</div>
    </div>
    <div class="search-wrapper">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="搜索或输入网址" autofocus>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-results-inner" id="searchResultsInner"></div>
      </div>
    </div>
    <div class="main-area">
      <div class="top-sites-section">
        <div class="section-header">
          <h2 class="section-title">常用网站</h2>
          <button class="section-link" id="rankToggle">TOP访问</button>
        </div>
        <div class="sites-grid" id="sitesGrid">
        </div>
      </div>
      <aside class="rank-panel" id="rankPanel">
        <h3 class="rank-panel-title">TOP访问</h3>
        <ol class="rank-list" id="rankList"></ol>
      </aside>
    </div>
    <div class="add-form" id="addForm">
      <div class="add-form-inner">
        <h3>添加网站</h3>
        <label>网址</label>
        <input type="text" id="addUrl" placeholder="https://example.com">
        <label>名称</label>
        <input type="text" id="addName" placeholder="网站名称">
        <div class="add-form-actions">
          <button class="add-form-cancel" id="addCancel">取消</button>
          <button class="add-form-confirm" id="addConfirm">确认</button>
        </div>
      </div>
    </div>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
